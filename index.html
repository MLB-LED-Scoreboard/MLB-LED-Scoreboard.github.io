<!DOCTYPE html>
<html lang="en" data-bs-theme="auto">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MLB LED Scoreboard Config Editor</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="icon" type="image/png" sizes="96x96" href="favicon-96x96.png">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
</head>
<body>
  <div class="container py-4">
    <h1 class="mb-1">MLB LED Scoreboard Config Editor</h1>
    <div class="d-flex align-items-center gap-3 mb-3">
      <span>Select schema version:</span>
      <select id="version-select" class="form-select form-select-sm w-auto">
        <option value="dev">dev</option>
        <option value="config-gen-schemas">config-gen-schemas (Testing)</option>
      </select>
    </div>
    <ul class="nav nav-tabs mb-4" role="tablist">
      <li class="nav-item">
        <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#tab-config" type="button">config.json</button>
      </li>
      <li class="nav-item">
        <button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-teams" type="button">colors/teams.json</button>
      </li>
      <li class="nav-item">
        <button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-scoreboard" type="button">colors/scoreboard.json</button>
      </li>
      <li class="nav-item">
        <button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-wxhy" type="button">coordinates/wXhY.json</button>
      </li>
      <li class="nav-item">
        <button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-local" type="button">Local Schema</button>
      </li>
    </ul>

    <div class="tab-content">

      <div class="tab-pane fade show active" id="tab-config">
        <div class="row">
          <div class="col-lg-7">
            <div id="jedison-config"><div class="loader"></div></div>
          </div>
          <div class="col-lg-5">
            <div class="sticky-top pt-2">
              <div class="d-flex gap-2 mt-2">
                <button class="btn btn-primary btn-sm download-btn" data-target="output-config" data-filename="config.json">Download</button>
                <button class="btn btn-secondary btn-sm copy-btn" data-target="output-config">Copy</button>
              </div>
              <p class="text-secondary small mb-1">config.json</p>
              <textarea id="output-config" class="json-output form-control font-monospace" wrap="off" readonly></textarea>
            </div>
          </div>
        </div>
      </div>

      <div class="tab-pane fade" id="tab-teams">
        <div class="row">
          <div class="col-lg-7">
            <div id="jedison-teams"></div>
          </div>
          <div class="col-lg-5">
            <div class="sticky-top pt-2">
              <div class="d-flex gap-2 mt-2">
                <button class="btn btn-primary btn-sm download-btn" data-target="output-teams" data-filename="teams.json">Download</button>
                <button class="btn btn-secondary btn-sm copy-btn" data-target="output-teams">Copy</button>
              </div>
              <p class="text-secondary small mb-1">colors/teams.json</p>
              <textarea id="output-teams" class="json-output form-control font-monospace" wrap="off" readonly></textarea>
            </div>
          </div>
        </div>
      </div>

      <div class="tab-pane fade" id="tab-scoreboard">
        <div class="row">
          <div class="col-lg-7">
            <div id="jedison-scoreboard"></div>
          </div>
          <div class="col-lg-5">
            <div class="sticky-top pt-2">
              <div class="d-flex gap-2 mt-2">
                <button class="btn btn-primary btn-sm download-btn" data-target="output-scoreboard" data-filename="scoreboard.json">Download</button>
                <button class="btn btn-secondary btn-sm copy-btn" data-target="output-scoreboard">Copy</button>
              </div>
              <p class="text-secondary small mb-1">colors/scoreboard.json</p>
              <textarea id="output-scoreboard" class="json-output form-control font-monospace" wrap="off" readonly></textarea>
            </div>
          </div>
        </div>
      </div>

      <div class="tab-pane fade" id="tab-wxhy">
        <div class="d-flex align-items-center gap-3 mb-4">
          <label for="size-select" class="text-secondary mb-0">Matrix dimensions:</label>
          <select id="size-select" class="form-select form-select-sm w-auto">
            <option value="w32h32" selected>w32h32</option>
            <option value="w64h32">w64h32</option>
            <option value="w64h64">w64h64</option>
            <option value="w128h32">w128h32</option>
            <option value="w128h64">w128h64</option>
            <option value="w192h64">w192h64</option>
          </select>
        </div>
        <div class="row">
          <div class="col-lg-7">
            <div id="jedison-wxhy"></div>
          </div>
          <div class="col-lg-5">
            <div class="sticky-top pt-2">
              <div class="d-flex gap-2 mt-2">
                <button class="btn btn-primary btn-sm download-btn" data-target="output-wxhy" data-filename="w128h64.json">Download</button>
                <button class="btn btn-secondary btn-sm copy-btn" data-target="output-wxhy">Copy</button>
              </div>
              <p class="text-secondary small mb-1">coordinates/<span id="wxhy-size-label">w128h64</span>.json</p>
              <textarea id="output-wxhy" class="json-output form-control font-monospace" wrap="off" readonly></textarea>
            </div>
          </div>
        </div>
      </div>

      <div class="tab-pane fade" id="tab-local">
        <div class="d-flex align-items-center gap-3 mb-4">
          <input type="file" id="local-schema-input" accept=".json" class="d-none">
          <button class="btn btn-outline-secondary btn-sm" id="local-schema-btn">
            <i class="bi bi-folder2-open"></i> Choose file...
          </button>
          <span id="local-schema-name" class="text-secondary small"></span>
        </div>
        <div class="row">
          <div class="col-lg-7">
            <div id="jedison-local"></div>
          </div>
          <div class="col-lg-5">
            <div class="sticky-top pt-2">
              <div class="d-flex gap-2 mt-2">
                <button class="btn btn-primary btn-sm download-btn" data-target="output-local" data-filename="">Download</button>
                <button class="btn btn-secondary btn-sm copy-btn" data-target="output-local">Copy</button>
              </div>
              <p class="text-secondary small mb-1" id="local-output-label"></p>
              <textarea id="output-local" class="json-output form-control font-monospace" wrap="off" readonly></textarea>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
